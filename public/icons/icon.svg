<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg-gradient)"/>
  
  <!-- Chess knight piece (simplified) -->
  <g fill="white">
    <!-- Knight head -->
    <path d="M 40 45 Q 35 35 45 30 L 50 35 L 55 30 Q 65 35 60 45 L 58 50 L 42 50 Z"/>
    <!-- Knight neck -->
    <rect x="42" y="48" width="16" height="12" rx="2"/>
    <!-- Knight base -->
    <path d="M 38 58 L 62 58 L 65 70 Q 65 75 60 75 L 40 75 Q 35 75 35 70 Z"/>
  </g>
  
  <!-- Sparkle effect -->
  <circle cx="75" cy="35" r="3" fill="#4ade80"/>
  <circle cx="85" cy="50" r="2" fill="#4ade80" opacity="0.7"/>
  <circle cx="70" cy="25" r="2" fill="#4ade80" opacity="0.5"/>
</svg>

<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="container">
    <h2>♟️ Chess Assistant</h2>

    <div class="setting-group">
      <label for="depth">Analysis Depth</label>
      <input type="range" id="depth" min="5" max="25" value="15" step="1" />
      <div class="depth-value">
        <span class="depth-display" id="depthValue">15</span>
        <div class="depth-label">
          <div class="depth-subtext">moves ahead</div>
        </div>
      </div>
      <div class="depth-hint">
        • 5-10: Fast, basic analysis<br />
        • 11-18: Balanced (recommended)<br />
        • 19-25: Deep, slower analysis
      </div>
    </div>

    <div class="info">
      <strong>💡 How to use:</strong><br />
      1. Go to a game on chess.com<br />
      2. Click "Analyze" button in the overlay<br />
      3. View top 3 suggested moves with scores
    </div>

    <button class="save-btn" id="saveBtn">Save Settings</button>
    <div class="status" id="status">✓ Settings saved!</div>
  </div>

  <script src="popup.js"></script>
</body>

</html>

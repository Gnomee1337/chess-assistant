<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .container {
      padding: 20px;
    }
    
    h2 {
      margin: 0 0 20px 0;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .setting-group {
      background: rgba(255, 255, 255, 0.1);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    
    input[type="range"] {
      width: 100%;
      margin: 8px 0;
      cursor: pointer;
    }
    
    .depth-value {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 13px;
    }
    
    .depth-display {
      font-size: 24px;
      font-weight: 700;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 16px;
      border-radius: 6px;
    }
    
    .info {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      border-left: 3px solid #4ade80;
    }
    
    .save-btn {
      width: 100%;
      padding: 12px;
      background: #4ade80;
      color: #064e3b;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }
    
    .save-btn:hover {
      background: #22c55e;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(74, 222, 128, 0.4);
    }
    
    .save-btn:active {
      transform: translateY(0);
    }
    
    .status {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: #4ade80;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .status.show {
      opacity: 1;
    }
    
    .depth-hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>♟️ Chess Assistant</h2>
    
    <div class="setting-group">
      <label for="depth">Analysis Depth</label>
      <input type="range" id="depth" min="5" max="25" value="15" step="1">
      <div class="depth-value">
        <span class="depth-display" id="depthValue">15</span>
        <div style="text-align: right;">
          <div style="font-size: 11px; opacity: 0.8;">moves ahead</div>
        </div>
      </div>
      <div class="depth-hint">
        • 5-10: Fast, basic analysis<br>
        • 11-18: Balanced (recommended)<br>
        • 19-25: Deep, slower analysis
      </div>
    </div>
    
    <div class="info">
      <strong>💡 How to use:</strong><br>
      1. Go to a game on chess.com<br>
      2. Click "Analyze" button in the overlay<br>
      3. View top 3 suggested moves with scores
    </div>
    
    <button class="save-btn" id="saveBtn">Save Settings</button>
    <div class="status" id="status">✓ Settings saved!</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
